<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الـ PDF إلى ملف قابل للبحث 🔍</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 80px; background-color: #f4f7f6; color: #333; }
        .card { border: 2px dashed #007bff; padding: 40px; border-radius: 12px; width: 90%; max-width: 450px; margin: 0 auto; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 16px; font-weight: bold; width: 100%; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .download-btn { background-color: #2ecc71; text-decoration: none; display: block; color: white; padding: 12px 24px; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        #message { margin-top: 20px; font-weight: bold; font-size: 15px; padding: 10px; border-radius: 5px; }
        .loading-text { color: #34495e; background-color: #ebf5fb; }
        .success-text { color: #27ae60; background-color: #e8f8f5; }
        .error-text { color: #c0392b; background-color: #fadbd8; }
    </style>
</head>
<body>

    <h1>محول ملفات PDF إلى قابلة للبحث 🔍</h1>
    <p>قم برفع ملفك مباشرة ليتم تحويله عبر الـ OCR ليدعم البحث والنسخ (عربي وإنجليزي).</p>

    <div class="card">
        <input type="file" id="pdfFile" accept=".pdf">
        <button id="uploadBtn" onclick="handleDirectUpload()">ابدأ التحويل الآن</button>
        <a id="downloadBtn" class="download-btn" style="display: none;" target="_blank">📥 تحميل الملف الجاهز</a>
    </div>

    <div id="message" style="display: none;"></div>

    <script>
        async function handleDirectUpload() {
            const fileInput = document.getElementById('pdfFile');
            const uploadBtn = document.getElementById('uploadBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const messageEl = document.getElementById('message');

            if (fileInput.files.length === 0) {
                showMessage("الرجاء اختيار ملف PDF أولاً!", "error-text");
                return;
            }

            const file = fileInput.files[0];

            // فحص حجم الملف قبل الرفع (الخطة المجانية لـ OCR space تدعم حتى 25 ميجابايت للملف الواحد)
            const maxSizeInBytes = 25 * 1024 * 1024; 
            if (file.size > maxSizeInBytes) {
                showMessage("حجم الملف كبير جداً! الحد الأقصى المسموح به هو 25 ميجابايت.", "error-text");
                return;
            }

            const formData = new FormData();
            // ملحوظة: للحصول على أداء مستقر وسريع جداً بدون أعطال، يفضل التسجيل المجاني في ocr.space ووضع مفتاحك هنا بدلاً من 'helloworld'
            formData.append('apikey', 'helloworld'); 
            formData.append('language', 'ara'); // يدعم العربية والانجليزية معاً تلقائياً
            formData.append('isOverlayRequired', 'true');
            formData.append('isCreateSearchablePdf', 'true');
            formData.append('isSearchablePdfHideTextLayer', 'true');
            formData.append('file', file);

            // تحديث عناصر الواجهة
            uploadBtn.disabled = true;
            uploadBtn.innerText = "جاري المعالجة والتحويل (قد يستغرق دقيقة)...";
            downloadBtn.style.display = "none";
            showMessage("جاري رفع الملف ومعالجته عبر الـ OCR سحابياً مباشرة... يرجى عدم إغلاق الصفحة.", "loading-text");

            try {
                // الرفع المباشر إلى السيرفر السحابي
                const response = await fetch('https://ocr.space', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`خطأ في السيرفر: ${response.status}`);
                }

                const data = await response.json();

                if (data.OCRExitCode === 1 && data.SearchablePdfURL) {
                    downloadBtn.href = data.SearchablePdfURL;
                    downloadBtn.style.display = "block";
                    showMessage("تم التحويل بنجاح! اضغط على الزر أدناه لتحميل نسخة الـ Searchable PDF الخاصة بك.", "success-text");
                } else {
                    const apiError = data.ErrorMessage ? data.ErrorMessage[0] : 'فشلت معالجة الملف، ربما الملف يحتوي على نصوص معقدة جداً أو السيرفر مضغوط.';
                    throw new Error(apiError);
                }

            } catch (error) {
                showMessage(`حدث خطأ أثناء المعالجة: ${error.message}`, "error-text");
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = "ابدأ التحويل الآن";
            }
        }

        function showMessage(text, className) {
            const messageEl = document.getElementById('message');
            messageEl.style.display = "block";
            messageEl.innerText = text;
            messageEl.className = className;
        }
    </script>
</body>
</html>
